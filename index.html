<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meat Friday Calculator</title>
    <link rel="icon" href="https://meatfridays.github.io/favicon.ico">
    <link rel="stylesheet" href="https://meatfridays.github.io/style.css">
</head>
<body>
    <div class="introDiv">
    <h1>Meat Friday Calculator</h1>
    <h3>Feasting on Fridays? Here's your go-to calculator.<br></h3>
    </div>
    
    <div class="meatFridayDiv"><form id="easterForm">
        <label id="easterLabel" style="font-size: 1.5rem;">Input Easter Date: </label>
        <input type="date" id="easter" name="easter" class="formInput">
        <button type="submit" id="submitButton" class="formInput" style="font-size: 1rem;">Submit</button>
    </form>
        
    <h2>MEAT FRIDAYS: (DD/MM)</h2>
    <h3 id="meatFridays">Meat Fridays appear after submission...</h3>
    </div> <br>
    
    <p>made with love by NH</p>
    <script src="https://meatfridays.github.io/script.js"></script>
</body>
</html>
