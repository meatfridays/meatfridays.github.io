<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meat Friday Calculator</title>
    <link rel="icon" href="https://meatfridays.github.io/favicon.ico">
    <link rel="stylesheet" href="https://meatfridays.github.io/style.css">
</head>
<body>
    <div class="introDiv">
    <h1>Meat Friday Calculator!</h1>
    <h3>Feasting on Fridays? Here's your go-to preparation!<br>Input the Easter date of the year to load!</h3>
    <p>Calculates all Meat Fridays in that year.<br>(Made with love for Catholics across the globe)</p>
    </div>
    <form>
        <label for="easter">Input Easter Date: </label> <br>
        <input type="date" id="easter" name="easter"> <br>
        <button type="submit">Submit</button>
    </form> <br>
    <div class="meatFridayDiv">
    <h2>MEAT FRIDAYS: (DD/MM)</h2>
    <h3 id="meatFridays">Meat Fridays here...</h3>
    </div> <br>
    <p>made with love by NH</p>
    <script src="https://meatfridays.github.io/script.js"></script>
</body>
</html>
