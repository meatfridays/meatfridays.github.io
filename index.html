<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://meatfridays.github.io/favicon.ico"
    <title>Meat Friday Calculator</title>
    <link rel="stylesheet" href="https://meatfridays.github.io/style.css">
</head>
<body>
    <h1>Meat Friday Calculator!</h1>
    <h3>Feasting on Fridays? Here's your go-to preparation!<br>Input the Easter date of the year to load!<br>Calculates all Meat Fridays in that year.<br>(Made with love for Catholics across the globe)</h3>
    <form>
        <label for="easter">Input Easter Date: (DDMMYYYY)</label> <br>
        <input type="text" id="easter" name="easter"> <br>
        <button type="submit">Submit</button>
    </form> <br>
    <h2>MEAT FRIDAYS: (DD/MM)</h2>
    <h3 id="meatFridays"></h3>
    <p>made with love by NH</p>
    <script src="https://meatfridays.github.io/script.js"></script>
</body>
</html>
